{{ define "main" }}
<div class="container my-12">
  <div class="mx-auto max-w-3xl">
    <h1 class="article-title">{{ .Title }}</h1>
    {{ with .Params.description }}
    <p class="not-prose mb-8 text-base text-gray7">{{ . }}</p>
    {{ end }}
    <div class="prose prose-a:hover:text-blue7 prose-pre:bg-gray1 prose-pre:text-gray9 max-w-none">
      {{ .Content }}
    </div>
    <p class="mt-10 text-sm text-gray6">
      ← <a href="/install/" class="text-ooniblue underline hover:text-blue7">Back to all install options</a>
    </p>
  </div>
</div>
{{ end }}
